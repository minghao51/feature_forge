site_name: Feature Forge
site_url: https://minghao51.github.io/feature_forge/
theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            docstring_style: google
  - mkdocs-jupyter:
      execute: false
      theme: light
      include: ["*.ipynb", "*.py"]
      allow_errors: false
      include_source: true
      ignore_h1_titles: true
      cache: true
      cache_dir: .cache/mkdocs-jupyter
markdown_extensions:
  - pymdownx.blocks.caption
  - md_in_html
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
extra_css:
  - stylesheets/jupyter-fix.css
extra_javascript:
  - javascripts/jupyter-theme-bridge.js
extra:
  version:
    provider: mike
nav:
  - Home: index.md
  - Quick Start: quick_start.md
  - API Key Setup: API_KEY_SETUP.md
  - Methods: methods.md
  - API Reference: api_reference.md
  - Migration Guide: migration_guide.md
  - MALMAS Technical Roadmap: MALMAS_Technical_Roadmap.md
  - Implementation Plan:
      - Overview: plan/00_index.md
      - 01 Architecture: plan/01_architecture.md
      - 02 Directory Structure: plan/02_directory_structure.md
      - 03 Key Design Decisions: plan/03_key_design_decisions.md
      - 04 Implementation Phases: plan/04_implementation_phases.md
      - 05 Dependencies: plan/05_dependencies.md
      - 06 Data Strategy: plan/06_data_strategy.md
      - 07 Observability: plan/07_observability.md
      - 08 Experiment Tracking: plan/08_experiment_tracking.md
      - 09 Baseline Selection: plan/09_baseline_selection.md
  - Notebooks:
      - Overview: notebooks/index.md
      - 01 Getting Started: notebooks/01_getting_started.ipynb
      - 02 Pipeline Deep Dive: notebooks/02_pipeline_deep_dive.ipynb
      - 03 Benchmarks & Artifacts: notebooks/03_benchmarks_and_artifacts.ipynb
      - 04 Custom Method: notebooks/04_custom_method.ipynb
      - 05 Methods Deep Dive: notebooks/05_methods_deep_dive.ipynb
