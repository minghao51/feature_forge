site_name: Feature Forge
site_url: https://minghao51.github.io/feature_forge/
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            docstring_style: google
markdown_extensions:
  - pymdownx.blocks.caption
  - md_in_html
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
extra_css:
  - stylesheets/notebooks.css
extra_javascript:
  - javascripts/notebooks.js
extra:
  version:
    provider: mike
nav:
  - Home: index.md
  - Quick Start: quick_start.md
  - API Key Setup: API_KEY_SETUP.md
  - Methods: methods.md
  - API Reference: api_reference.md
  - Migration Guide: migration_guide.md
  - MALMAS Technical Roadmap: MALMAS_Technical_Roadmap.md
  - Implementation Plan:
      - Overview: plan/00_index.md
      - 01 Architecture: plan/01_architecture.md
      - 02 Directory Structure: plan/02_directory_structure.md
      - 03 Key Design Decisions: plan/03_key_design_decisions.md
      - 04 Implementation Phases: plan/04_implementation_phases.md
      - 05 Dependencies: plan/05_dependencies.md
      - 06 Data Strategy: plan/06_data_strategy.md
      - 07 Observability: plan/07_observability.md
      - 08 Experiment Tracking: plan/08_experiment_tracking.md
      - 09 Baseline Selection: plan/09_baseline_selection.md
  - Notebooks:
      - Overview: notebooks/index.md
      - 01 Quick Start: notebooks/01-quick-start.md
      - 02 Agents: notebooks/02-agents.md
      - 03 Router & Modes: notebooks/03-router.md
      - 04 Iterative Pipeline: notebooks/04-iterative-pipeline.md
      - 05 Experiment Matrix: notebooks/05-experiment-matrix.md
      - 06 Baselines: notebooks/06-baselines.md
      - 07 Evaluation: notebooks/07-evaluation.md
      - 08 Artifacts: notebooks/08-artifacts.md
      - 09 Configuration: notebooks/09-configuration.md
      - 10 Method Comparison: notebooks/10-method-comparison.md
