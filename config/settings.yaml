# Default settings for feature_forge.
# Override via environment variables (FF_* prefix) or init args.
# Secrets are managed in .env via dotenvx — this file is committed in plaintext.

task: "classification"
metric: "auc"
n_rounds: 4
min_effective: 2
random_state: 42
verbose: 1

llm:
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com"
  temperature: 0.2
  max_tokens: 4096
  cache_responses: true
  max_concurrent_calls: 3

tracker:
  backend: "wandb"
  project: "feature-forge"

router:
  strategy: "hybrid"
  min_agents: 1

memory:
  max_size: 100
  persistence_dir: "memory_files/agent_memories"

evaluation:
  cv_folds: 5
  test_size: 0.4
